services:

  backend:
    container_name: homic_backend  #CONTAINER NAME
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000" # CONNECTING TO DJANGO PORT
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: homic_db
    environment:
      POSTGRES_DB: homic_db
      POSTGRES_USER: homic_user
      POSTGRES_PASSWORD: homic_password
    volumes:
      - postgres_data:/var/lib/postgresql/data 

volumes: 
  postgres_data:

